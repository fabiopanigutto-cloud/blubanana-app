<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Blubanana">
<title>Blubanana Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#09111F;--ink2:#3A4A5E;--ink3:#8896A8;
  --surface:#F4F6FA;--card:#FFF;--border:#E8ECF2;--border2:#D0D8E4;
  --blu:#102B50;--blu2:#1B3F6E;--blu3:#2C5F9E;
  --gold:#F5BE00;--gold2:#D9A800;--gold3:#FFF8D6;
  --fabio:#2563EB;--fabio-l:#EEF4FF;
  --anna:#D97706;--anna-l:#FFF7ED;
  --ok:#059669;--ok-l:#ECFDF5;
  --warn:#DC2626;--warn-l:#FEF2F2;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --r:18px;--rs:12px;
  --sh:0 1px 3px rgba(9,17,31,.06),0 4px 16px rgba(9,17,31,.08);
  --sh2:0 8px 32px rgba(9,17,31,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--surface)}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--surface);overflow:hidden;position:relative}

/* HEADER */
.hdr{background:var(--blu);padding:env(safe-area-inset-top,44px) 20px 0;flex-shrink:0;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:var(--gold);opacity:.06;border-radius:50%;pointer-events:none}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;color:#fff;letter-spacing:-.5px}
.logo em{color:var(--gold);font-style:normal}
.hdr-date{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.hdr-add{background:var(--gold);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blu);transition:transform .1s;flex-shrink:0}
.hdr-add:active{transform:scale(.92)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 0 16px}
.kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px 12px}
.kpi-v{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-l{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}

/* NAVBAR */
.nav{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;border:none;background:none;cursor:pointer;color:var(--ink3);font-size:8px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.2px;transition:color .15s}
.nb.on{color:var(--gold2)}
.nb svg{width:20px;height:20px;stroke-width:1.7}

/* SCROLL */
.pg{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pg::-webkit-scrollbar{display:none}
.pg-pad{padding:14px 14px 90px}

/* CARD */
.c{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.c-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0}
.c-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--ink)}
.c-body{padding:12px 16px 16px}

/* ROW GENERICA */
.row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.row:last-child{border-bottom:none}
.row:active{background:var(--surface)}
.row-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--surface)}
.row-body{flex:1;min-width:0}
.row-title{font-weight:600;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:12px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-right{text-align:right;flex-shrink:0}

/* STATO */
.st{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.st-prev{background:#F1F5F9;color:#64748B}
.st-conf{background:#EEF4FF;color:#2563EB}
.st-lav{background:#FFF7ED;color:#D97706}
.st-cons{background:#F5F3FF;color:#7C3AED}
.st-pag{background:#ECFDF5;color:#059669}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-f{background:var(--fabio-l);color:var(--fabio)}
.badge-a{background:var(--anna-l);color:var(--anna)}
.badge-ok{background:var(--ok-l);color:var(--ok)}
.badge-warn{background:var(--warn-l);color:var(--warn)}
.badge-gray{background:var(--surface);color:var(--ink3)}

/* SPLIT BAR */
.split{height:7px;border-radius:4px;overflow:hidden;background:var(--border);display:flex;margin:8px 0 6px}
.split-f{background:var(--fabio);transition:width .5s}
.split-a{background:var(--anna);transition:width .5s}
.split-lbl{display:flex;justify-content:space-between;font-size:12px}

/* MARGINE BAR */
.mbar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin:6px 0 4px}
.mbar-fill{height:100%;border-radius:3px;transition:width .4s}

/* SBOX */
.sbox{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sb{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.sb-v{font-family:'Syne',sans-serif;font-weight:800;font-size:22px}
.sb-l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-top:3px}
.sb-s{font-size:12px;color:var(--ink3);margin-top:4px}

/* INP */
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);background:var(--surface);outline:none;transition:border .15s;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:var(--blu);background:#fff}
textarea.inp{resize:none;line-height:1.5}
select.inp{cursor:pointer}
.inp-w{position:relative}
.inp-w .inp{padding-right:42px}
.mic{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:8px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:opacity .15s}
.mic.ta{top:14px;transform:none}
.mic.on{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.row2{display:flex;gap:10px}.row2 .field{flex:1}
.row3{display:flex;gap:8px}.row3 .field{flex:1}
.tog{display:flex;gap:6px;margin-bottom:13px}
.tog-btn{flex:1;padding:10px 6px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;text-align:center;transition:all .15s}
.tog-btn.f{border-color:var(--fabio);background:var(--fabio-l);color:var(--fabio)}
.tog-btn.a{border-color:var(--anna);background:var(--anna-l);color:var(--anna)}
.tog-btn.ok{border-color:var(--ok);background:var(--ok-l);color:var(--ok)}

/* PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);transition:all .15s;white-space:nowrap}
.pill.on{background:var(--blu);border-color:var(--blu);color:#fff}

/* SHEET */
.ov{position:fixed;inset:0;background:rgba(9,17,31,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.ov.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:430px;background:var(--card);border-radius:22px 22px 0 0;z-index:101;transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:93dvh;display:flex;flex-direction:column;box-shadow:var(--sh2)}
.sheet.on{transform:translateX(-50%) translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sh-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sh-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.sh-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sh-body::-webkit-scrollbar{display:none}
.sh-pad{padding:16px 18px}

/* DETAIL */
.det{position:absolute;inset:0;background:var(--surface);z-index:60;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
.det.on{transform:translateX(0)}
.det-hdr{background:var(--blu);padding:env(safe-area-inset-top,44px) 20px 20px;flex-shrink:0;position:relative;overflow:hidden}
.det-hdr::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:var(--gold);opacity:.07;border-radius:50%;pointer-events:none}
.det-back{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.65);font-size:13px;cursor:pointer;border:none;background:none;padding:0;margin-bottom:14px;font-family:'DM Sans',sans-serif}
.det-back svg{width:15px;height:15px;stroke-width:2}
.det-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;line-height:1.2}
.det-sub{font-size:13px;color:rgba(255,255,255,.55);margin-top:5px}
.det-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.det-tag{padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);font-size:11px;font-weight:500}
.det-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 40px}
.det-content::-webkit-scrollbar{display:none}

/* PIPELINE DOT */
.pi{display:flex;align-items:center;overflow-x:auto;padding-bottom:4px}
.pi::-webkit-scrollbar{display:none}
.pi-step{display:flex;align-items:center;flex-shrink:0}
.pi-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .2s}
.pi-dot.done{background:var(--ok);border-color:var(--ok)}
.pi-dot.curr{background:var(--blu);border-color:var(--blu);box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.pi-line{width:20px;height:2px;background:var(--border2)}
.pi-line.done{background:var(--ok)}

/* SPESE */
.spesa-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.spesa-row:last-child{border-bottom:none}
.spesa-ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--surface)}
.spesa-lbl{flex:1;font-size:13px;color:var(--ink)}
.spesa-val{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--warn)}

/* MARGINE CARD */
.margine-card{background:linear-gradient(135deg,var(--ok-l),#fff);border:1.5px solid #A7F3D0;border-radius:var(--r);padding:14px 16px}
.margine-big{font-family:'Syne',sans-serif;font-weight:800;font-size:28px}
.margine-row{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-top:4px}

/* PREVENTIVO */
.prev-section{background:var(--surface);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.prev-item-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prev-item-row:last-child{margin-bottom:0}
.prev-item-desc{flex:1;font-size:13px;color:var(--ink)}
.prev-item-qty{width:48px;text-align:center;font-size:13px;color:var(--ink3)}
.prev-item-price{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--ink);text-align:right;width:64px}
.prev-total{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--ink);text-align:center;padding:16px 0 8px}
.prev-text-area{background:var(--surface);border-radius:12px;padding:14px;font-size:13px;color:var(--ink2);line-height:1.7;white-space:pre-wrap;word-break:break-word;border:1.5px solid var(--border)}

/* CALENDARIO */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.cal-nb{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cal-dow{text-align:center;font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 1px;cursor:pointer;position:relative}
.cal-day:active{background:var(--surface)}
.cal-day.other .cal-day-n{opacity:.3}
.cal-day.today .cal-day-n{background:var(--blu);color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center}
.cal-day.sel:not(.today){background:var(--gold3);border-radius:8px}
.cal-day-n{font-size:11px;font-weight:500;color:var(--ink);line-height:21px;text-align:center;width:21px;height:21px}
.cal-dots{display:flex;gap:2px;justify-content:center;margin-top:1px;max-width:22px;flex-wrap:wrap}
.cd{width:4px;height:4px;border-radius:50%}
.cd-f{background:var(--fabio)}.cd-a{background:var(--anna)}.cd-g{background:var(--gold2)}.cd-ok{background:var(--ok)}.cd-p{background:var(--purple)}

/* EVENT CARD */
.ev{background:var(--card);border-radius:13px;border:1px solid var(--border);border-left:3px solid var(--border2);padding:11px 14px;margin-bottom:8px;box-shadow:var(--sh);cursor:pointer}
.ev:active{transform:scale(.99)}
.ev.f{border-left-color:var(--fabio)}
.ev.a{border-left-color:var(--anna)}
.ev.g{border-left-color:var(--gold2)}
.ev.ok{border-left-color:var(--ok)}
.ev.p{border-left-color:var(--purple)}
.ev-when{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px}
.ev-title{font-size:13px;font-weight:600;color:var(--ink);margin-top:2px}
.ev-sub{font-size:11px;color:var(--ink3);margin-top:1px}

/* AGENT BANNER */
.agent-banner{background:linear-gradient(135deg,var(--blu),var(--blu3));border-radius:var(--r);padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden}
.agent-banner::after{content:'🤖';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:34px;opacity:.18}
.agent-banner-t{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff}
.agent-banner-s{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px;line-height:1.4}
.ab-btn{margin-top:10px;background:var(--gold);color:var(--blu);border:none;border-radius:8px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer}

/* TL (timeline) */
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:9px}
.tl-dot{position:absolute;left:-17px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid var(--card)}
.tl-dot.f{background:var(--fabio)}
.tl-dot.a{background:var(--anna)}
.tl-dot.g{background:var(--gold2)}
.tl-dot.ok{background:var(--ok)}
.tl-dot.p{background:var(--purple)}
.tl-c{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 12px;box-shadow:var(--sh)}
.tl-date{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px}
.tl-title{font-size:13px;font-weight:600;color:var(--ink);margin-top:1px}
.tl-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* QUICK ACTION */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qa{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif}
.qa:active{transform:scale(.97);background:var(--surface)}
.qa-icon{font-size:26px;margin-bottom:8px}
.qa-label{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--ink)}
.qa-desc{font-size:11px;color:var(--ink3);margin-top:3px}

/* SEARCH */
.search-w{position:relative;margin-bottom:12px}
.search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3)}
.search-ic svg{width:15px;height:15px}
.search-inp{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--card);outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(--blu)}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-blu{background:var(--blu);color:#fff}
.btn-blu:active{background:var(--blu2)}
.btn-gold{background:var(--gold);color:var(--blu);font-weight:600}
.btn-gold:active{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--border)}
.btn-ghost:active{background:var(--surface)}
.btn-warn{background:var(--warn-l);color:var(--warn)}
.btn-ok{background:var(--ok-l);color:var(--ok)}
.btn-sm{padding:7px 13px;font-size:12px}
.btn-full{width:100%}

/* NETTO BOX */
.netto-box{padding:12px;border-radius:var(--rs);background:var(--ok-l);border:1.5px solid #A7F3D0;margin-bottom:13px}
.netto-v{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--ok)}
.netto-l{font-size:11px;color:var(--ok);opacity:.8;margin-top:2px}

/* NOTE */
.note-bbl{background:var(--surface);border-radius:12px;padding:12px;font-size:14px;color:var(--ink2);line-height:1.55}

/* AVVISO */
.avviso{background:var(--gold3);border:1.5px solid #F5C518;border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.avviso-t{font-weight:600;font-size:13px;color:#92700A}
.avviso-s{font-size:12px;color:#B5860F;margin-top:4px;line-height:1.4}

/* TABS */
.tabs{display:flex;background:var(--surface);border-radius:12px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:8px;border-radius:10px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s;text-align:center}
.tab.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.07)}

/* RUOLI */
.rc{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:7px;font-size:10px;font-weight:600;margin:2px}
.rc-f{background:var(--fabio-l);color:var(--fabio)}
.rc-a{background:var(--anna-l);color:var(--anna)}

/* ATTREZ */
.attrow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.attrow:last-child{border-bottom:none}

/* FATTURA ROW */
.frow{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.frow-body{flex:1;min-width:0}
.frow-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frow-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.frow-r{text-align:right;flex-shrink:0}
.frow-amt{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.frow-amt.f{color:var(--fabio)}.frow-amt.a{color:var(--anna)}.frow-amt.sp{color:var(--warn)}

/* CASSA ROW */
.crow{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)}
.crow:last-child{border-bottom:none}
.crow-ico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.crow-body{flex:1;min-width:0}
.crow-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow-date{font-size:11px;color:var(--ink3);margin-top:1px}
.crow-amt{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;flex-shrink:0}

/* AV */
.av{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex-shrink:0;color:#fff}

/* TOAST */
.toast{position:fixed;bottom:calc(66px + env(safe-area-inset-bottom) + 10px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:50px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;max-width:90vw;box-shadow:var(--sh2)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:36px 20px;color:var(--ink3)}
.empty-icon{font-size:36px;opacity:.35;margin-bottom:10px}
.empty-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--ink2);margin-bottom:5px}
.hidden{display:none!important}
</style>

function syncUI(){

function updateKPIs(){
  const aperti=S.lavori.filter(l=>l.stato!=='pagato').length;
  const daInc=S.fatture.filter(f=>f.tipo==='entrata'&&f.pagato==='attesa').reduce((s,f)=>s+f.importo,0);
  const margini=S.lavori.filter(l=>l.importo>0).map(l=>margine(l.id).pct);
  const avgMargine=margini.length?Math.round(margini.reduce((a,b)=>a+b,0)/margini.length):0;
  document.getElementById('k-aperti').textContent=aperti;
  document.getElementById('k-incasso').textContent='€'+fmt(daInc);
  document.getElementById('k-margine').textContent=avgMargine+'%';
}

function margine(lavId){
  const l=S.lavori.find(x=>x.id==lavId);
  if(!l||!l.importo)return{netto:0,spese:0,margine:0,pct:0};
  const speseLav=S.spese.filter(s=>s.lavoro_id==lavId).reduce((t,s)=>t+s.importo,0);
  const netto=Math.round(l.importo*0.85);
  const margineVal=netto-speseLav;
  const pct=netto>0?Math.round(margineVal/netto*100):0;
  return{netto,spese:speseLav,margine:margineVal,pct};
}

// ── AGENDA ──
function renderAgenda(){
  const oggi=new Date().toISOString().split('T')[0];
  const evs=buildEvs();
  const yr=S.calYear,mo=S.calMonth;
  const monName=new Date(yr,mo,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  let dow=new Date(yr,mo,1).getDay();dow=dow===0?6:dow-1;
  const lastD=new Date(yr,mo+1,0).getDate();
  const days=[];
  for(let i=dow-1;i>=0;i--){const d=new Date(yr,mo,-i);days.push({s:ds(d),n:d.getDate(),o:true})}
  for(let d=1;d<=lastD;d++){const dt=new Date(yr,mo,d);days.push({s:ds(dt),n:d,o:false})}
  while(days.length<42){const d=new Date(yr,mo+1,days.length-lastD-dow+1);days.push({s:ds(d),n:d.getDate(),o:true})}
  const sel=S.calSelDay||oggi;
  const dayEvs=evs.filter(e=>e.date===sel);
  const upcoming=evs.filter(e=>e.date>=oggi).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);

  document.getElementById('agenda-body').innerHTML=`
    <div class="agent-banner">
      <div class="agent-banner-t">🤖 Agente Post-Shooting</div>
      <div class="agent-banner-s">Timeline editing/consegna generate automaticamente da ogni shooting. Tocca un giorno per vedere i task.</div>
    </div>

    <div class="c" style="padding:12px">
      <div class="cal-nav">
        <button class="cal-nb" onclick="calPrev()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
        <span class="cal-month">${monName}</span>
        <button class="cal-nb" onclick="calNext()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>
      <div class="cal-grid">
        ${['L','M','M','G','V','S','D'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${days.map(d=>{
          const de=evs.filter(e=>e.date===d.s);
          const dots=[...new Set(de.map(e=>e.cls))].slice(0,4);
          return `<div class="cal-day ${d.o?'other':''} ${d.s===oggi?'today':''} ${d.s===sel&&d.s!==oggi?'sel':''}" onclick="calSel('${d.s}')">
            <div class="cal-day-n">${d.n}</div>
            ${dots.length?`<div class="cal-dots">${dots.map(c=>`<div class="cd cd-${c}"></div>`).join('')}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="c">
      <div class="c-hd"><span class="c-title">${fmtDate(sel)}</span><span style="font-size:12px;color:var(--ink3)">${dayEvs.length} task</span></div>
      ${dayEvs.length?dayEvs.map(e=>evEl(e)).join(''):`<div class="empty" style="padding:16px 20px"><div class="empty-icon">📭</div><div class="empty-title">Giorno libero</div></div>`}
    </div>

    <div class="c">
      <div class="c-hd"><span class="c-title">📅 In arrivo</span></div>
      ${upcoming.map(e=>{
        const dfn=Math.round((new Date(e.date+'T12:00:00')-new Date())/86400000);
        return `<div class="ev ${e.cls}" onclick="${e.lid?`openDet('lavoro',${e.lid})`:''}">
          <div class="ev-when">${dfn===0?'Oggi':dfn===1?'Domani':'Fra '+dfn+'gg'} · ${fmtDate(e.date)}</div>
          <div class="ev-title">${e.emoji} ${e.title}</div>
          <div class="ev-sub">${e.sub}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function evEl(e){
  return `<div class="ev ${e.cls}" onclick="${e.lid?`openDet('lavoro',${e.lid})`:''}">
    <div class="ev-when">${e.tipo==='shoot'?'📸 Shooting':'🔧 Post-shooting'}</div>
    <div class="ev-title">${e.emoji} ${e.title}</div>
    <div class="ev-sub">${e.sub}</div>
  </div>`;
}

function buildEvs(){
  const evs=[];
  S.lavori.forEach(l=>{
    if(!l.data)return;
    evs.push({date:l.data,title:l.titolo,sub:cname(l.cliente_id),tipo:'shoot',cls:'g',emoji:TE[l.tipo]||'📷',lid:l.id});
    const tmpl=POST_TMPL[l.tipo]||POST_TMPL.altro;
    let cur=new Date(l.data+'T12:00:00');cur.setDate(cur.getDate()+1);
    tmpl.forEach(step=>{
      evs.push({date:ds(cur),title:step.label,sub:l.titolo,tipo:'post',cls:step.cls,emoji:step.e,lid:l.id});
      cur.setDate(cur.getDate()+step.g);
    });
  });
  return evs;
}

function ds(d){return d.toISOString().split('T')[0]}
function calSel(d){S.calSelDay=d;renderAgenda()}
function calPrev(){if(S.calMonth===0){S.calMonth=11;S.calYear--}else S.calMonth--;renderAgenda()}
function calNext(){if(S.calMonth===11){S.calMonth=0;S.calYear++}else S.calMonth++;renderAgenda()}

    <select class="inp" style="flex:1;font-size:13px;padding:8px 10px" onchange="S.nlRuoli[${i}].r=this.value">
      ${RUOLI_PRE.map(r=>`<option ${x.r===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <select class="inp" style="width:80px;font-size:13px;padding:8px 8px" onchange="S.nlRuoli[${i}].p=this.value">
      <option value="fabio" ${x.p==='fabio'?'selected':''}>Fabio</option>
      <option value="anna" ${x.p==='anna'?'selected':''}>Anna</option>
    </select>
    <button class="btn btn-ghost btn-sm" style="padding:8px 10px" onclick="S.nlRuoli.splice(${i},1);renderRuoli()">✕</button>
  </div>`).join('');
}
function addRuolo(){S.nlRuoli.push({r:'📸 Shooting',p:'fabio'});renderRuoli()}
function selStato(el,s){document.querySelectorAll('#nl-pills .pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');S.nlStato=s}

function initCliTipo(){selCli('privato')}
function selCli(t){
  S.cliTipo=t;
  [{id:'tc-priv',v:'privato'},{id:'tc-az',v:'azienda'},{id:'tc-wed',v:'wedding'}].forEach(x=>{
    const el=document.getElementById(x.id);if(el)el.className='tog-btn'+(t===x.v?' ok':'');
  });
}

function initFat(){selFat('fabio')}
function selFat(w){
  S.fatturante=w;
  const f=document.getElementById('tf-f');const a=document.getElementById('tf-a');
  if(f)f.className='tog-btn'+(w==='fabio'?' f':'');
  if(a)a.className='tog-btn'+(w==='anna'?' a':'');
  calcNetto();
}
function calcNetto(){
  const imp=parseFloat(document.getElementById('nf-importo')?.value)||0;
  const tipo=document.getElementById('nf-tipo')?.value;
  const w=document.getElementById('nf-netto-wrap');if(w)w.style.display=tipo==='entrata'?'':'none';
  const el=document.getElementById('nf-netto');if(el)el.textContent='€ '+fmt(Math.round(imp*.85));
}

function initCassaTipo(){selCassa('entrata')}
function selCassa(t){
  S.cassaTipo=t;
  const i=document.getElementById('tc-in');const o=document.getElementById('tc-out');
  if(i)i.className='tog-btn'+(t==='entrata'?' ok':'');
  if(o)o.className='tog-btn'+(t==='uscita'?' a':'');
}

function initSpesa(){selSpesa('km');selSpesaPaga('fabio')}
function selSpesa(t){
  S.spesaTipo=t;
  ['km','carburante','pasto','materiali','altro'].forEach(x=>{
    const el=document.getElementById('sp-'+x);if(el)el.className='tog-btn'+(t===x?' ok':'');
  });
  const kf=document.getElementById('sp-km-field');if(kf)kf.style.display=t==='km'?'':'none';
}
function selSpesaPaga(p){
  S.spesaPaga=p;
  const f=document.getElementById('sp-pf');const a=document.getElementById('sp-pa');
  if(f)f.className='tog-btn'+(p==='fabio'?' f':'');
  if(a)a.className='tog-btn'+(p==='anna'?' a':'');
}
function calcKm(){
  const km=parseFloat(document.getElementById('sp-km-val')?.value)||0;
  const imp=Math.round(km*0.22*100)/100;
  const el=document.getElementById('sp-km-tot');if(el)el.textContent='€'+imp;
  const si=document.getElementById('sp-importo');if(si)si.value=imp||'';
}

// ── SAVE ──
async function saveLavoro(){
  const t=document.getElementById('nl-titolo').value.trim();
  if(!t){toast('Inserisci un titolo ⚠️');return}
  const obj={id:Date.now(),titolo:t,
    cliente_id:parseInt(document.getElementById('nl-cliente').value)||null,
    data:document.getElementById('nl-data').value,
    tipo:document.getElementById('nl-tipo').value,
    importo:parseFloat(document.getElementById('nl-importo').value)||0,
    stato:S.nlStato,ruoli:S.nlRuoli.map(x=>({ruolo:x.r,persona:x.p})),
    note:document.getElementById('nl-note').value,
    created_at:new Date().toISOString()
  };
  if(sb&&!SB_URL.includes('YOUR_'))await sb.from('lavori').insert(obj);
  S.lavori.unshift(obj);syncUI();closeSheet();
  toast('✅ Lavoro aggiunto!');
  document.getElementById('nl-titolo').value='';document.getElementById('nl-note').value='';
  S.nlRuoli=[{r:'📸 Shooting',p:'fabio'},{r:'🎨 Editing',p:'anna'}];
  if(S.pg==='lavori')renderLavori();else renderHome();
}

async function saveCliente(){
  const n=document.getElementById('nc-nome').value.trim();
  const co=document.getElementById('nc-cognome').value.trim();
  if(!n&&!co){toast('Inserisci nome o cognome ⚠️');return}
  const obj={id:Date.now(),nome:n,cognome:co,
    tel:document.getElementById('nc-tel').value,
    email:document.getElementById('nc-email').value,
    tipo:S.cliTipo,note:document.getElementById('nc-note').value
  };
  if(sb&&!SB_URL.includes('YOUR_'))await sb.from('clienti').insert(obj);
  S.clienti.push(obj);populateSels();closeSheet();
  toast('✅ Cliente aggiunto!');
  ['nc-nome','nc-cognome','nc-tel','nc-email','nc-note'].forEach(id=>document.getElementById(id).value='');
  if(S.pg==='clienti')renderClienti();
}

async function saveFattura(){
  const desc=document.getElementById('nf-desc').value.trim();
  const imp=parseFloat(document.getElementById('nf-importo').value)||0;
  if(!desc||!imp){toast('Completa descrizione e importo ⚠️');return}
  const obj={id:Date.now(),desc,importo:imp,intestata:S.fatturante,
    data:document.getElementById('nf-data').value,
    tipo:document.getElementById('nf-tipo').value,
    pagato:document.getElementById('nf-pagato').value,
    lavoro_id:parseInt(document.getElementById('nf-lavoro').value)||null
  };
  if(sb&&!SB_URL.includes('YOUR_'))await sb.from('fatture').insert(obj);
  S.fatture.unshift(obj);syncUI();closeSheet();
  toast('✅ Fattura registrata!');
  ['nf-desc','nf-importo'].forEach(id=>document.getElementById(id).value='');
  if(S.pg==='finanze')renderFinanze();else renderHome();
}

async function saveCassa(){
  const desc=document.getElementById('cm-desc').value.trim();
  const imp=parseFloat(document.getElementById('cm-importo').value)||0;
  if(!desc||!imp){toast('Completa descrizione e importo ⚠️');return}
  const obj={id:Date.now(),desc,importo:imp,tipo_mov:S.cassaTipo,
    data:document.getElementById('cm-data').value,cat:document.getElementById('cm-cat').value
  };
  if(sb&&!SB_URL.includes('YOUR_'))await sb.from('cassa').insert(obj);
  S.cassa.unshift(obj);syncUI();closeSheet();
  toast('✅ Movimento registrato!');
  ['cm-desc','cm-importo'].forEach(id=>document.getElementById(id).value='');
  if(S.pg==='finanze')renderFinanze();else renderHome();
}

async function saveSpesa(){
  const desc=document.getElementById('sp-desc').value.trim();
  const imp=parseFloat(document.getElementById('sp-importo').value)||0;
  if(!imp){toast('Inserisci importo ⚠️');return}
  const km=S.spesaTipo==='km'?parseFloat(document.getElementById('sp-km-val')?.value)||0:null;
  const obj={id:Date.now(),tipo:S.spesaTipo,desc:desc||S.spesaTipo,importo:imp,
    km,data:document.getElementById('sp-data').value,
    lavoro_id:parseInt(document.getElementById('sp-lavoro').value)||null,
    pagato_da:S.spesaPaga
  };
  if(sb&&!SB_URL.includes('YOUR_'))await sb.from('spese').insert(obj);
  S.spese.unshift(obj);syncUI();closeSheet();
  toast('✅ Spesa registrata!');
  ['sp-desc','sp-importo','sp-km-val'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=''});
  if(S.pg==='finanze')renderFinanze();else if(S.pg==='lavori')renderLavori();
}

// ── ACTIONS ──
function chStato(id,stato){
  const l=S.lavori.find(x=>x.id==id);if(!l)return;
  l.stato=stato;
  if(sb&&!SB_URL.includes('YOUR_'))sb.from('lavori').update({stato}).eq('id',id);
  syncUI();renderDetLav(id);toast(`${STATI[stato].e} ${STATI[stato].l}`);
}
function delLav(id){
  if(!confirm('Eliminare questo lavoro?'))return;
  S.lavori=S.lavori.filter(l=>l.id!=id);
  if(sb&&!SB_URL.includes('YOUR_'))sb.from('lavori').delete().eq('id',id);
  syncUI();closeDet();toast('Lavoro eliminato');
}

// ── VOICE ──
function dictate(fId,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Input vocale non supportato');return}
  const r=new SR();r.lang='it-IT';r.continuous=false;r.interimResults=false;
  btn.classList.add('on');
  r.onresult=e=>{
    const t=e.results[0][0].transcript;
    const f=document.getElementById(fId);
    f.value=(f.value?f.value+' ':'')+t;
    btn.classList.remove('on');toast('🎤 '+t.slice(0,40)+(t.length>40?'…':''));
  };
  r.onerror=()=>{btn.classList.remove('on');toast('Errore microfono')};
  r.onend=()=>btn.classList.remove('on');
  r.start();
}

// ── UTILS ──
function fmt(n){if(!n&&n!==0)return'0';return Math.round(n).toLocaleString('it-IT')}
function fmtDate(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'})}
function cname(id){const c=S.clienti.find(x=>x.id==id);return c?c.nome+' '+c.cognome:'—'}
function avc(id){return AVC[id%AVC.length]}
function netti(){
  const e=S.fatture.filter(f=>f.tipo==='entrata'&&f.pagato==='pagato');
  return[e.filter(f=>f.intestata==='fabio').reduce((s,f)=>s+f.importo,0),
         e.filter(f=>f.intestata==='anna').reduce((s,f)=>s+f.importo,0)];
}
function cassaSaldo(){return S.cassa.reduce((s,m)=>s+(m.tipo_mov==='entrata'?m.importo:-m.importo),0)}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2400);
}
